name: Build Executables (Go)

on:
  push:
    branches:
      - main
      - develop
      - feat/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/blip-list-generator-${{ matrix.goos }}${{ matrix.ext }} ./cmd/blip-list-generator

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blip-list-generator-${{ matrix.goos }}${{ matrix.ext }}
          path: bin/blip-list-generator-${{ matrix.goos }}${{ matrix.ext }}

      - name: Show build info
        run: |
          ls -lh bin/
          file bin/blip-list-generator-${{ matrix.goos }}${{ matrix.ext }} || true

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: |
          go mod tidy
          go test ./...

      - name: Verify build
        run: |
          go build -o /tmp/test-build ./cmd/blip-list-generator
          /tmp/test-build --help || true

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            blip-list-generator-linux/blip-list-generator-linux
            blip-list-generator-windows.exe/blip-list-generator-windows.exe
            blip-list-generator-darwin/blip-list-generator-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
